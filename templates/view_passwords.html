{% set show_navbar = true %}
{% extends "base.html" %}

{% block title %}Your Passwords - Password Manager{% endblock %}

{% block content %}
<div class="container">
  <div class="card">
    <h1 class="title">Your Saved Passwords</h1>
    <table class="password-table">
      <thead>
        <tr>
          <th>Service</th>
          <th>Username</th>
          <th>Password</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="password-table-body">
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block modals %}
<div id="get-password-modal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal('get-password-modal')">&times;</span>
    <h2>Get Password</h2>
    <div class="input-group">
      <label for="get-service">Service</label>
      <select id="get-service"></select>
    </div>
    <div class="input-group">
      <label for="get-username">Username</label>
      <input id="get-username" type="text" placeholder="Enter username">
    </div>
    <button class="btn-primary" onclick="getPassword()">Get</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener("DOMContentLoaded", function() {
    fetchPasswords();

    async function fetchPasswords() {
      try {
        const response = await fetch("/get-all-passwords");
        if (response.ok) {
          const passwords = await response.json();
          const tableBody = document.getElementById("password-table-body");
          tableBody.innerHTML = "";

          passwords.forEach(({ id, service, username, password }) => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${service}</td>
              <td>${username}</td>
              <td><span class="password-hidden">••••••••</span></td>
              <td>
                <button class="btn-get" onclick="showPasswordInline(this, '${password.replace(/'/g, "\\'")}')">Show</button>
                <button class="btn-edit" onclick="showEditPasswordModal(${id})">Edit</button>
                <button class="btn-delete" onclick="deletePasswordEntry(${id})">Delete</button>
              </td>
            `;
            tableBody.appendChild(row);
          });

          if (passwords.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#999;">No passwords saved yet.</td></tr>';
          }
        }
      } catch (error) {
        console.error("Error fetching passwords:", error);
      }
    }

    window.showPasswordInline = function(btn, password) {
      const span = btn.parentElement.parentElement.querySelector('.password-hidden');
      if (span.textContent === '••••••••') {
        span.textContent = password;
        btn.textContent = 'Hide';
      } else {
        span.textContent = '••••••••';
        btn.textContent = 'Show';
      }
    };

    window.showEditPasswordModal = function(id) {
      const newPassword = prompt('Enter a new password:');
      if (newPassword) {
        editPassword(id, newPassword);
      }
    };

    async function editPassword(id, newPassword) {
      try {
        const response = await fetch("/edit-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, password: newPassword })
        });
        const data = await response.json();
        if (response.ok) {
          showNotification(data.success || "Password updated!", "success");
          fetchPasswords();
        } else {
          showNotification(data.error || "An unknown error occurred.", "error");
        }
      } catch (error) {
        showNotification("Failed to edit the password. Please try again.", "error");
      }
    }

    window.deletePasswordEntry = async function(id) {
      if (!confirm("Are you sure you want to delete this password?")) return;
      try {
        const response = await fetch("/delete-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id })
        });
        const data = await response.json();
        if (response.ok) {
          showNotification(data.success || "Password deleted!", "success");
          fetchPasswords();
        } else {
          showNotification(data.error || "An unknown error occurred.", "error");
        }
      } catch (error) {
        showNotification("Failed to delete the password.", "error");
      }
    };
  });
</script>
{% endblock %}
